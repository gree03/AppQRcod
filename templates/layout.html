<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{% block title %}AppQRcod{% endblock %}</title>
</head>
<body>
    <header>
        <div class="support">Служба поддержки: <a href="tel:{{ support_phone }}">{{ support_phone }}</a></div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    {% if cart_total %}
    <div class="cart-sticky">
        <span>Итого: {{ cart_total }} ₽</span>
        <a href="{{ url_for('cart_view') }}">В корзину</a>
    </div>
    {% endif %}
</body>
</html>
